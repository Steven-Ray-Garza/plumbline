# Local fast-feedback mirror of the Tier-1 gate. Install: pip install pre-commit && pre-commit install
repos:
  - repo: local
    hooks:
      - id: codex-build
        name: compile codex from source
        entry: python3 tools/build.py
        language: system
        files: ^(src/|tools/build\.py)
        pass_filenames: false
      - id: codex-checks
        name: tier-1 deterministic checks
        entry: python3 tools/checks.py
        language: system
        files: ^(src/|dist/|evals/|tools/)
        pass_filenames: false

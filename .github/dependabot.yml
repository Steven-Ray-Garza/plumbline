# Dependabot keeps our pins maintainable: SHA-pinned actions and a version-locked promptfoo would
# otherwise rot silently. It opens PRs for the github-actions and npm ecosystems only; it does NOT
# auto-merge. Project policy: npm/pip bumps observe a ~14-day supply-chain quarantine before merging;
# first-party SHA-pinned GitHub Actions are exempt (lower risk). These PRs are a notification, not a bypass.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # One grouped PR for all action bumps — five separate ci.yml-touching PRs thrash against the
    # "require branches up to date" rule.
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
